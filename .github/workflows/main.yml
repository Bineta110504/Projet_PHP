name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "prod" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2 Build simple (PHP ici donc juste test)
      - name: Check PHP file
        run: php -l index.php

      # 3 Login Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4 Build image Docker
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/projet-php .

      # 5 Push image Docker Hub
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projet-php

      # 6 Déploiement serveur (SSH)
      - name: Deploy to server
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            docker pull ${{ secrets.DOCKER_USERNAME }}/projet-php &&
            docker stop app || true &&
            docker rm app || true &&
            docker run -d -p 80:80 --name app ${{ secrets.DOCKER_USERNAME }}/projet-php
          "

      # 7 Notification (optionnel Slack)
      - name: Slack notification
        if: success()
        run: echo "Déploiement réussi"